version: 1

# Context profiles decide, per workflow, which SQL queries run and how much the
# context broker is allowed to return. The point is to keep packets small and to
# keep the large generated mirrors out of model context. See docs/token-reduction.md.

defaults:
  maxAuditEvents: 5
  maxBacklogEvents: 5
  maxBacklogItems: 12
  maxRoutes: 12
  maxFiles: 8
  # Files the broker must never name in a packet. These are the generated mirrors
  # of data the broker already returns in bounded form via SQL. Reading them in
  # bulk is what blows up the context window.
  forbiddenBulkFiles:
    - data/backlog-source.sql
    - data/backlog.json
    - data/audit/audit-log.jsonl
    - docs/generated/**
  deliveryFlow:
    - "Plan: choose one feature slice, inspect the bounded packet, and name the exact items/routes/contracts in scope."
    - "Design: decide RBAC/scope/state behavior and test seams before editing code."
    - "Build: edit only the scoped files plus directly related tests; defer generated docs until the slice is stable."
    - "Test: run targeted checks first, record failed results once, and run full governance only at feature or release checkpoints."
  verificationPolicy:
    - "Prefer one consolidated verification event per feature slice instead of repeated micro-events for the same command evidence."
    - "Use npm run backlog:fail when a test command fails so the backlog is not success-biased."
    - "Do not run npm run ci:governance for every small item; reserve it for feature completion, process/tooling changes, or pre-push."

workflows:
  route:
    maxFiles: 8
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - routes_by_feature
      - recent_audit
    requiredChecks:
      - npm run backlog:validate
    guidance:
      - Query SQLite before opening any planning or generated docs.
      - Inspect route files only after the packet names them.

  rbac:
    maxFiles: 10
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - persona_workflows_by_feature
      - recent_audit
    requiredChecks:
      - npm run agent:evals
    guidance:
      - Prefer permission, entitlement, and scope anchors over broad docs.
      - Include negative-test files before broad UI files.

  db-migration:
    maxFiles: 10
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - recent_backlog_events
    requiredChecks:
      - npm run backlog:validate
    guidance:
      - Inspect schema, migration, and repository files named by anchors.
      - Do not run destructive database commands from this packet.

  ui:
    maxFiles: 10
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - routes_by_feature
      - recent_audit
    requiredChecks:
      - npm run test:agent-context
    guidance:
      - Keep generated planning docs out of context unless the task is docs-only.
      - Inspect components and tests named by route/file anchors first.

  integration:
    maxFiles: 10
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - integrations_by_feature
      - recent_audit
    requiredChecks:
      - npm run guardrails:check
    guidance:
      - Prefer registry, credential-boundary, and webhook files over generated docs.
      - Do not inspect or print secret material.

  docs:
    maxFiles: 12
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - recent_audit
    requiredChecks:
      - npm run audit:validate
    guidance:
      - For generated docs, update generators or source config first.
      - Use SQLite summaries instead of bulk-loading generated mirrors.

  agentic-tooling:
    maxFiles: 12
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - recent_audit
    requiredChecks:
      - npm run guardrails:check
      - npm run test:agent-context
    guidance:
      - Treat context tooling as bounded, deterministic, and reversible.
      - Do not emit audit events for throwaway tooling experiments.

  delivery-slice:
    maxFiles: 6
    maxBacklogEvents: 3
    maxAuditEvents: 3
    maxBacklogItems: 16
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - persona_workflows_by_feature
      - routes_by_feature
      - recent_audit
    requiredChecks:
      - npm run backlog:validate
      - npm run test:agent-context
    guidance:
      - Use this profile for fast complete-dev work where token cost matters.
      - Batch plan, design, build, and test into one feature slice before recording evidence.
      - Run only targeted checks during implementation; run npm run ci:governance only at a feature/release checkpoint or after tooling/policy changes.
