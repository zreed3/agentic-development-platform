version: 1

defaults:
  maxAuditEvents: 5
  maxBacklogEvents: 5
  maxBacklogItems: 12
  maxRoutes: 12
  maxFiles: 8
  forbiddenBulkFiles:
    - docs/traceability/v4-1-development-tracker.json
    - docs/traceability/v4-1-development-tracker.sql
    - docs/traceability/v4-1-backlog-source.sql
    - docs/interactive/**
  deliveryFlow:
    - "Plan: choose one V4.1 feature slice, inspect the bounded packet, and name the exact items/routes/contracts in scope."
    - "Design: decide tenant/business scope, RBAC, entitlement, page-state, and test seams before editing code."
    - "Build: edit only scoped implementation files plus directly related tests; defer generated docs until the slice is stable."
    - "Test: run targeted checks first, record failed results once, and run full traceability/prepush gates only at feature, release, or push checkpoints."
  verificationPolicy:
    - "Prefer one consolidated verification event per feature slice when the same command evidence covers multiple tasks, tests, use cases, or success criteria."
    - "Use pnpm backlog:fail when a test command fails so the SQL backlog is not success-biased."
    - "Do not run pnpm dev:prepush for every small item; reserve it for feature completion, process/tooling changes, or before push."

workflows:
  route:
    maxFiles: 8
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - routes_by_feature
      - recent_audit
    requiredChecks:
      - pnpm route-registry:check
    guidance:
      - Query SQLite before opening planning docs.
      - Inspect route registry and route files only after the packet names them.

  rbac:
    maxFiles: 10
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - persona_workflows_by_feature
      - recent_audit
    requiredChecks:
      - pnpm test -- apps/web/src/lib/navigation/route-registry.test.ts
      - pnpm test -- apps/web/src/lib/server/hidden-crm-route-guard.test.ts
    guidance:
      - Prefer permission, entitlement, and business-scope anchors over broad docs.
      - Include negative-test files before broad UI files.

  db-migration:
    maxFiles: 10
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - recent_backlog_events
    requiredChecks:
      - pnpm db:validate-migrations
    guidance:
      - Inspect schema, migration, and repository files named by anchors.
      - Do not run destructive database commands from this packet.

  ui:
    maxFiles: 10
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - routes_by_feature
      - recent_audit
    requiredChecks:
      - pnpm --filter @bord/web typecheck
      - pnpm test
    guidance:
      - Keep generated planning docs out of context unless the task is docs-only.
      - Inspect components and tests named by route/file anchors first.

  integration:
    maxFiles: 10
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - integrations_by_feature
      - recent_audit
    requiredChecks:
      - pnpm guardrails:check
      - pnpm test
    guidance:
      - Prefer registry, credential-boundary, and webhook files over generated docs.
      - Do not inspect or print secret material.

  docs:
    maxFiles: 12
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - recent_audit
    requiredChecks:
      - pnpm drift:generated
    guidance:
      - For generated docs, update generators or source config first.
      - Use SQLite summaries instead of bulk-loading tracker JSON.

  agentic-tooling:
    maxFiles: 12
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - recent_audit
    requiredChecks:
      - pnpm guardrails:check
      - pnpm test:agent-context
    guidance:
      - Treat context tooling as local tooling unless Zach folds it into V4.1 audit.
      - Do not emit tracker audit events for tooling-only experiments.

  delivery-slice:
    maxFiles: 6
    maxBacklogEvents: 3
    maxAuditEvents: 3
    maxBacklogItems: 16
    queries:
      - feature_current_status
      - backlog_items_by_feature
      - persona_workflows_by_feature
      - routes_by_feature
      - recent_audit
    requiredChecks:
      - pnpm backlog:validate
      - pnpm test:agent-context
    guidance:
      - Use this profile for fast complete-dev V4.1 work where token cost matters.
      - Batch plan, design, build, and test into one feature slice before recording evidence.
      - Run only targeted checks during implementation; run pnpm ci:traceability or pnpm dev:prepush only at a feature/release checkpoint, before push, or after tooling/policy changes.
